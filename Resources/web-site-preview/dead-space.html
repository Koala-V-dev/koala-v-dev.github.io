<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podgląd: Dead Space RIG</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #555555;
            border-radius: 6px;
            border: 1px solid #090d16;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #777777;
        }

        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background: #050608;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        /* Tło pancerza - metalowy pancerz inżynieryjny */
        .suit-backplate {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, #1c1f26 0%, #0d0f12 100%);
            border-radius: 16px;
            border: 3px solid #2d333f;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 25px;
            overflow: hidden;
        }

        /* Dodanie faktury metalu i zarysowań pancerza */
        .suit-backplate::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(90deg, transparent 48%, rgba(0, 0, 0, 0.4) 49%, rgba(0, 0, 0, 0.4) 51%, transparent 52%),
                repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(0, 0, 0, 0.15) 8px, rgba(0, 0, 0, 0.15) 16px);
            pointer-events: none;
            opacity: 0.35;
        }

        /* Kręgosłup wtopiony w pancerz */
        .spine-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-left: 20px;
            z-index: 2;
        }

        /* Projektor holograficzny na ramieniu pancerza */
        .hologram-projector {
            width: 12px;
            height: 24px;
            background: #2d333f;
            border: 2px solid #5a6578;
            border-radius: 4px;
            position: absolute;
            top: 30px;
            left: 60px;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .hologram-projector::after {
            content: "";
            position: absolute;
            top: 4px;
            left: 2px;
            width: 4px;
            height: 4px;
            background: #00f2fe;
            border-radius: 50%;
            box-shadow: 0 0 8px #00f2fe;
            animation: projector-pulse 1s infinite alternate;
        }

        @keyframes projector-pulse {
            0% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        .rig-spine {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: #07090c;
            border: 3px solid #232731;
            padding: 10px 8px;
            border-radius: 12px;
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.9);
            width: 32px;
        }

        .spine-segment {
            height: 12px;
            width: 100%;
            background-color: #0c181a;
            border-radius: 2px;
            transition: all 0.25s ease;
        }

        /* Stany naładowania kręgosłupa (diegetyczne) */
        .spine-segment.active-cyan {
            background-color: #00f2fe;
            box-shadow: 0 0 10px #00f2fe, 0 0 2px #ffffff;
        }

        .spine-segment.active-yellow {
            background-color: #ffcc00;
            box-shadow: 0 0 10px #ffcc00;
        }

        .spine-segment.active-red {
            background-color: #ff3333;
            box-shadow: 0 0 10px #ff3333;
            animation: red-pulse 0.5s infinite alternate;
        }

        @keyframes red-pulse {
            0% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        .spine-node {
            height: 18px;
            width: 18px;
            background: #0c181a;
            border-radius: 50%;
            margin-top: 4px;
            margin-left: -4px;
            transition: all 0.25s ease;
        }

        .spine-node.active-cyan {
            background: #00f2fe;
            box-shadow: 0 0 12px #00f2fe;
        }

        .spine-node.active-yellow {
            background: #ffcc00;
            box-shadow: 0 0 12px #ffcc00;
        }

        .spine-node.active-red {
            background: #ff3333;
            box-shadow: 0 0 12px #ff3333;
            animation: red-pulse 0.5s infinite alternate;
        }

        /* Swobodnie unoszący się hologram trójwymiarowy */
        .projected-hologram {
            width: 260px;
            background: rgba(0, 242, 254, 0.03);
            border: 1px solid rgba(0, 242, 254, 0.25);
            box-shadow:
                0 0 25px rgba(0, 242, 254, 0.08),
                inset 0 0 15px rgba(0, 242, 254, 0.05);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 0.8rem;
            transform: perspective(800px) rotateY(-18deg) rotateX(4deg);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform-style: preserve-3d;
            outline: 1px solid transparent;
            position: relative;
            z-index: 10;
            animation: holo-float 3s infinite alternate ease-in-out;
            color: #00f2fe;
            text-shadow: 0 0 5px rgba(0, 242, 254, 0.4);
            transition: all 0.3s ease;
        }

        @keyframes holo-float {
            0% {
                transform: perspective(800px) rotateY(-18deg) rotateX(4deg) translateY(0px);
            }

            100% {
                transform: perspective(800px) rotateY(-15deg) rotateX(2deg) translateY(-8px);
            }
        }

        .holo-scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom,
                    transparent 50%,
                    rgba(0, 242, 254, 0.08) 50%,
                    rgba(0, 242, 254, 0.08) 54%,
                    transparent 54%);
            background-size: 100% 8px;
            pointer-events: none;
            opacity: 0.8;
        }

        .holo-header {
            font-weight: bold;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            padding-bottom: 6px;
        }

        .holo-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Paski postępu */
        .progress-border {
            border: 1px solid rgba(0, 242, 254, 0.3);
            padding: 1px;
            height: 12px;
            border-radius: 2px;
            background: rgba(0, 0, 0, 0.5);
        }

        .progress-fill {
            height: 100%;
            background: #00f2fe;
            box-shadow: 0 0 6px #00f2fe;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        /* Przyciski holograficzne */
        .holo-btn {
            flex: 1;
            background: transparent;
            border: 1px solid #00f2fe;
            color: #00f2fe;
            padding: 8px;
            font-family: monospace;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 0 3px #00f2fe;
            box-shadow: 0 0 5px rgba(0, 242, 254, 0.1);
            transition: all 0.2s ease;
            outline: none;
        }

        .holo-btn:hover {
            background: rgba(0, 242, 254, 0.1);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .holo-btn:active {
            background: rgba(0, 242, 254, 0.3);
        }

        .holo-footer {
            font-size: 0.6rem;
            color: rgba(0, 242, 254, 0.4);
            border-top: 1px dashed rgba(0, 242, 254, 0.15);
            padding-top: 6px;
        }
    </style>
</head>

<body>

    <div class="suit-backplate">
        <!-- RIG kręgosłup zdrowia (diegetyczny) -->
        <div class="spine-container">
            <div class="hologram-projector"></div>
            <div class="rig-spine">
                <div class="spine-segment"></div>
                <div class="spine-segment"></div>
                <div class="spine-segment"></div>
                <div class="spine-segment"></div>
                <div class="spine-segment"></div>
                <div class="spine-segment"></div>
                <div class="spine-segment"></div>
                <div class="spine-segment"></div>
                <div class="spine-segment"></div>
                <div class="spine-segment"></div>
                <div class="spine-node"></div>
            </div>
        </div>

        <!-- Trójwymiarowy hologram wyświetlany obok -->
        <div class="projected-hologram">
            <div class="holo-scanline"></div>
            <div class="holo-header">&gt; RIG_MONITOR [ISHIMURA]</div>

            <div class="holo-body">
                <div id="status-desc">STATUS ZDROWIA: STABILNY</div>

                <div class="bar-chart">
                    <div style="font-size: 0.7rem; opacity: 0.8; margin-bottom: 4px;">INTEGRALNOŚĆ FIZYCZNA:</div>
                    <div class="progress-border">
                        <div class="progress-fill" id="armor-fill" style="width: 100%;"></div>
                    </div>
                </div>

                <div style="display: flex; gap: 8px; margin-top: 10px;">
                    <button class="holo-btn" onclick="heal()" tabindex="-1">APTEKACZKA</button>
                    <button class="holo-btn" onclick="damage()" tabindex="-1">OBRAŻENIA</button>
                </div>
            </div>

            <div class="holo-footer">SYSTEM OPERACYJNY ISAAC_C // CELESTIAL ENGINE</div>
        </div>
    </div>

    <script>
        let health = 100;
        const segments = Array.from(document.querySelectorAll('.spine-segment'));
        const node = document.querySelector('.spine-node');
        const statusDesc = document.getElementById('status-desc');
        const hologram = document.querySelector('.projected-hologram');

        function updateSpine() {
            // Oblicz ile z 10 segmentów ma być zapalonych
            const activeSegmentsCount = Math.ceil(health / 10);

            let activeClass = 'active-cyan';
            let colorVal = '#00f2fe';
            let statusText = 'STATUS ZDROWIA: STABILNY';

            if (health <= 20) {
                activeClass = 'active-red';
                colorVal = '#ff3333';
                statusText = 'OSTRZEŻENIE: STAN KRYTYCZNY';
                hologram.style.borderColor = 'rgba(255, 51, 51, 0.6)';
                hologram.style.color = '#ff3333';
                hologram.style.textShadow = '0 0 8px rgba(255, 51, 51, 0.5)';
            } else if (health <= 50) {
                activeClass = 'active-yellow';
                colorVal = '#ffcc00';
                statusText = 'OSTRZEŻENIE: SŁABE PARAMETRY';
                hologram.style.borderColor = 'rgba(255, 204, 0, 0.6)';
                hologram.style.color = '#ffcc00';
                hologram.style.textShadow = '0 0 8px rgba(255, 204, 0, 0.5)';
            } else {
                hologram.style.borderColor = 'rgba(0, 242, 254, 0.3)';
                hologram.style.color = '#00f2fe';
                hologram.style.textShadow = '0 0 8px rgba(0, 242, 254, 0.4)';
            }

            statusDesc.innerText = statusText;

            // Aktywacja segmentów od dołu (od indeksu 9 do 0)
            segments.forEach((seg, index) => {
                seg.className = 'spine-segment';
                const segmentId = 9 - index;
                if (segmentId < activeSegmentsCount) {
                    seg.classList.add(activeClass);
                }
            });

            // Dolny okrągły segment węzła
            node.className = 'spine-node';
            if (activeSegmentsCount > 0) {
                node.classList.add(activeClass);
            }

            // Aktualizacja paska w hologramie
            const armorFill = document.getElementById('armor-fill');
            armorFill.style.width = `${health}%`;
            armorFill.style.backgroundColor = colorVal;
            armorFill.style.boxShadow = `0 0 8px ${colorVal}`;

            // Dopasowanie koloru przycisków w locie
            const btns = document.querySelectorAll('.holo-btn');
            btns.forEach(btn => {
                btn.style.color = colorVal;
                btn.style.borderColor = colorVal;
                btn.style.textShadow = `0 0 4px ${colorVal}`;
            });
        }

        function damage() {
            if (health > 0) {
                health = Math.max(0, health - 20);
                updateSpine();
            }
        }

        function heal() {
            if (health < 100) {
                health = Math.min(100, health + 20);
                updateSpine();
            }
        }

        // Pierwsza konfiguracja
        updateSpine();
    </script>
</body>

</html>
