<!DOCTYPE html>
<html lang="pl">
<head>
  <script>
    (function () {
      try {
        var c = document.cookie.split('; ').find(row => row.startsWith('theme='));
        var t = c ? c.split('=')[1] : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
        if (t === 'dark') {
          document.documentElement.style.backgroundColor = '#030303';
          document.documentElement.style.color = '#c7c5c5';
        }
      } catch (e) {}
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Centrum Wiedzy — interaktywna platforma dydaktyczna z kursami IT, matematyką i nie tylko. Bez rejestracji, bez danych osobowych." />
  <title>Koala-V — Strona Główna</title>

  <link rel="shortcut icon" href="/logo.svg" type="image/x-icon" />
  <link rel="stylesheet" href="/css/home.css" />
  <script type="module" src="/js/home-app.js"></script>

  <style>
    /* Usuwamy podział na dwie kolumny z sekcji powitalnej, skoro nie ma formularza logowania */
    .welcome-section {
      grid-template-columns: 1fr !important;
    }
    
    /* Centrujemy zawartość tekstową i maskotkę */
    .welcome-message {
      align-items: center !important;
      text-align: center !important;
    }
    .welcome-message h1, .welcome-message p {
      text-align: center !important;
      padding-right: 0 !important;
    }
    .welcome-message img {
      align-self: center !important;
      margin-top: 2rem !important;
    }
    
    .cta-buttons {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
  </style>
</head>

<body class="browser-firefox app-bootstrapped" data-bootstrapped-at="100">
  <div id="app-main-content" class="app-main-content--visible">

    <header>
      <p class="site-logo medievalsharp-regular">
        <a href="/" aria-label="Koala-V — strona główna">
          <img
            src="/main-logo.svg"
            alt=""
            height="80"
            width="80"
            class="lazy-image lazy-image--loaded"
          />
          <span class="logo-text">Koala-V</span>
        </a>
      </p>
      <div class="header-actions" id="header-actions"></div>
    </header>

    <main id="welcome-page">

      <section id="welcome-section" class="welcome-section" aria-labelledby="welcome-title">
        <section id="welcome-message" class="welcome-message" aria-labelledby="welcome-title">
          <div>
            <h1 id="welcome-title">
              Witamy na stronie <span class="wrap-span-text">Koala-V!</span>
            </h1>
            <p>Twoje centrum materiałów edukacyjnych z dziedziny informatyki i matematyki.</p>
            <div class="cta-buttons">
              <a href="#courses-content-container" data-ui="button" data-variant="primary" class="bg-primary" role="button">
                Przeglądaj kursy ↓
              </a>
            </div>
          </div>
          <!-- Poprawne logo maskotki, nie główne logo strony -->
          <img
            src="/resources/courses/koalaWarrior.png"
            alt="Obrazek z koalą wojownikiem"
            loading="lazy"
            class="lazy-image lazy-image--loaded"
          />
        </section>
      </section>

      <section id="courses-content-container" class="courses-container">
        <h2>Katalog Kursów</h2>
        <!-- Struktura zgodna z oryginałem renderowana przez JS -->
        <div id="home-courses-grid-mount"></div>
      </section>

    </main>

    <footer>
      <p>
        <button class="important-font scroll-to-top-btn" aria-label="Wróć na górę" title="Wróć na górę">⬆</button>
        <span class="important-font">©</span> 2026 Koala-V
      </p>
      <p>kamil.zbrzezniak@teb.edu.pl</p>
    </footer>

  </div>
</body>
</html>
